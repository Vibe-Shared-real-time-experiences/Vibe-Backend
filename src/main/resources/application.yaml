server:
  port: 8080
  tomcat:
    threads:
      max: 100
spring:
  config:
    import: optional:file:.env[.properties]
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vibe_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 4
      minimum-idle: 1
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    hibernate:
      ddl-auto: validate
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      #      ssl:
      #        enabled: true # For cloud connections
      lettuce:
        pool:
          # Default is 8 connections
          max-active: 10
          max-idle: 5
          min-idle: 1
          max-wait: 2000ms

  cache:
    type: redis

# App config
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# MinIO / S3 Configuration
minio:
  endpoint: http://localhost:9000
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET_NAME:vibe-storage}
  region: ${MINIO_REGION:us-east-1}

# Security config
security:
  jwt:
    secret-key: ${JWT_SECRET_KEY:mysecretkey}
    issuer: "VibeApp"
    expiration-ms: 3600
    refresh-expiration-ms: 604800

node-id: "1"
